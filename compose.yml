services:
  postgres:
    image: postgres:18-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    environment:
      - POSTGRES_PASSWORD=${PG_PASS?Variable not set}
      - POSTGRES_USER=${PG_USER?Variable not set}
      - POSTGRES_DB=${PG_DB?Variable not set}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "${PG_PORT}:5432"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["mail"]
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "${MAIL_SMTP_PORT:-1025}:1025"
      - "${MAIL_WEB_PORT:-8025}:8025"

volumes:
  postgres-data:
