# Coolify Docker Compose stack (preprod-ready).
#
# Conventions Coolify suivies :
#   - Aucun `ports:` exposé sur l'hôte (Traefik gère le routing public)
#   - `expose:` pour les ports internes
#   - Magic vars: SERVICE_USER_POSTGRES / SERVICE_PASSWORD_POSTGRES (auto-générés & persistés)
#   - Magic vars: SERVICE_URL_API / SERVICE_URL_WEB (Coolify auto-generates, override via Domains UI)
#   - Pas de labels Traefik manuels (Coolify les injecte)

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB:-seve}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 20s
      retries: 20
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"

  api:
    image: ${API_IMAGE:-ghcr.io/hikyy/test-technique-ody-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${SERVICE_USER_POSTGRES}
      PG_PASS: ${SERVICE_PASSWORD_POSTGRES}
      PG_DB: ${POSTGRES_DB:-seve}
      AUTH_SECRET: ${SERVICE_BASE64_AUTH}
      AUTH_URL: ${SERVICE_URL_API}
      WEB_URL: ${SERVICE_URL_WEB}
      CORS_ORIGINS: ${SERVICE_URL_WEB}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORAGE_DIR: /data/storage
      STORAGE_PUBLIC_PATH: /storage
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5242880}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Sève <noreply@example.com>}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      RUN_MIGRATIONS: "1"
      RUN_SEED: ${RUN_SEED:-0}
    volumes:
      - api-storage:/data/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "3001"

  web:
    image: ${WEB_IMAGE:-ghcr.io/hikyy/test-technique-ody-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${SERVICE_URL_API}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${SERVICE_URL_API}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "3000"

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail"]
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    volumes:
      - mailpit-data:/data
    expose:
      - "1025"
      - "8025"

volumes:
  postgres-data:
  api-storage:
  mailpit-data:
